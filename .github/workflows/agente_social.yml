name: Agente Social

on:

  schedule:

    - cron: '0 10 * * *'

    - cron: '0 11 * * *'

    - cron: '0 12 * * *'

    - cron: '0 13 * * *'

    - cron: '0 14 * * *'

    - cron: '0 15 * * *'

    - cron: '0 16 * * *'

    - cron: '0 17 * * *'

    - cron: '0 18 * * *'

    - cron: '0 19 * * *'

    - cron: '0 20 * * *'

    - cron: '0 21 * * *'

    - cron: '0 22 * * *'

    - cron: '0 23 * * *'

    - cron: '0 0 * * *'

    - cron: '0 1 * * *'

  workflow_dispatch:

jobs:

  publicar:

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: '3.11'

      - name: Instalar dependencias

        run: pip install requests

      - name: Correr Agente Social

        env:

          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}

          BUFFER_TOKEN: ${{ secrets.BUFFER_TOKEN }}

          BUFFER_INSTAGRAM_CHANNEL_ID: ${{ secrets.BUFFER_INSTAGRAM_CHANNEL_ID }}

          BUFFER_X_CHANNEL_ID: ${{ secrets.BUFFER_X_CHANNEL_ID }}

        run: python agente_social.py
